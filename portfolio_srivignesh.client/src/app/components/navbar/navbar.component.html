<nav class="nav" [class.scrolled]="scrolled">
  <div class="container nav-wrap">
    <a href="#hero" class="nav-logo">
      <!-- Luxury serif monogram: gold S overlapping silver T -->
      <svg class="logo-mark" viewBox="0 4 86 60" width="70" height="52" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <linearGradient id="ngGold" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#F5E090"/>
            <stop offset="25%"  stop-color="#C8960C"/>
            <stop offset="55%"  stop-color="#ECC84A"/>
            <stop offset="100%" stop-color="#8A5C00"/>
          </linearGradient>
          <linearGradient id="ngSilver" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#F4F4F4"/>
            <stop offset="28%"  stop-color="#7A7A7A"/>
            <stop offset="65%"  stop-color="#C8C8C8"/>
            <stop offset="100%" stop-color="#484848"/>
          </linearGradient>
        </defs>
        <!-- T silver — behind -->
        <text x="30" y="62" font-family="Georgia,'Times New Roman',serif" font-size="64" font-weight="bold" fill="url(#ngSilver)">T</text>
        <!-- S gold — in front -->
        <text x="2"  y="62" font-family="Georgia,'Times New Roman',serif" font-size="64" font-weight="bold" fill="url(#ngGold)">S</text>
      </svg>

      <!-- Vertical divider -->
      <div class="logo-divider"></div>

      <!-- Wordmark: name + developer tag -->
      <div class="logo-wordmark">
        <div class="logo-title">
          <span class="logo-name">Srivignesh</span>
          <span class="logo-initial">T</span>
        </div>
        <div class="logo-sub">
          <span class="logo-sub-line"></span>
          <span class="logo-sub-tag">&lt; &lt;/&gt; &gt;</span>
          <span class="logo-sub-line"></span>
        </div>
      </div>
    </a>
    <ul class="nav-links" [class.open]="menuOpen">
      @for (link of links; track link.label; let i = $index) {
        <li>
          <a [href]="link.href" (click)="closeMenu()">
            {{ link.label }}
          </a>
        </li>
      }
      <li><a href="mailto:srivicky3597@gmail.com" class="nav-cta">Hire Me</a></li>
    </ul>
    <button class="burger" (click)="toggleMenu()" [class.open]="menuOpen">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>
