<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="10" fill="#050508"/>
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#F5E090"/>
      <stop offset="25%"  stop-color="#C8960C"/>
      <stop offset="55%"  stop-color="#ECC84A"/>
      <stop offset="100%" stop-color="#8A5C00"/>
    </linearGradient>
    <linearGradient id="silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#F4F4F4"/>
      <stop offset="28%"  stop-color="#7A7A7A"/>
      <stop offset="65%"  stop-color="#C8C8C8"/>
      <stop offset="100%" stop-color="#484848"/>
    </linearGradient>
  </defs>
  <!-- T silver — behind -->
  <text x="26" y="52" font-family="Georgia,'Times New Roman',serif" font-size="48" font-weight="bold" fill="url(#silver)">T</text>
  <!-- S gold — in front -->
  <text x="4"  y="52" font-family="Georgia,'Times New Roman',serif" font-size="48" font-weight="bold" fill="url(#gold)">S</text>
</svg>
